<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="720" viewBox="0 0 1600 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Nordic IoT Lab firmware uplink overview</title>
  <desc id="desc">A system map showing the nRF9161 DK sending GNSS telemetry through MQTT and CoAP uplinks to broker storage and a web dashboard.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFC"/>
      <stop offset="0.58" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F3F8F5"/>
    </linearGradient>
    <linearGradient id="deviceFill" x1="168" y1="214" x2="392" y2="438" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E6F8FA"/>
      <stop offset="1" stop-color="#CFEFF1"/>
    </linearGradient>
    <linearGradient id="uplinkFill" x1="492" y1="214" x2="716" y2="438" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF4D8"/>
      <stop offset="1" stop-color="#F9E3B0"/>
    </linearGradient>
    <linearGradient id="brokerFill" x1="816" y1="214" x2="1040" y2="438" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EAF2FF"/>
      <stop offset="1" stop-color="#DCE9FB"/>
    </linearGradient>
    <linearGradient id="dashFill" x1="1140" y1="214" x2="1364" y2="438" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8F7EC"/>
      <stop offset="1" stop-color="#D8F0DF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1C2B33" flood-opacity="0.09"/>
    </filter>
    <pattern id="dotGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#D9E5E8" opacity="0.65"/>
    </pattern>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L11 7L2 12" fill="none" stroke="#E3A23D" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .font { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .eyebrow { font-size: 18px; font-weight: 700; letter-spacing: 1.6px; text-transform: uppercase; fill: #58707B; }
      .title { font-size: 54px; font-weight: 800; fill: #20262E; }
      .subtitle { font-size: 24px; font-weight: 500; fill: #60717E; }
      .node-title { font-size: 25px; font-weight: 800; fill: #20262E; }
      .node-copy { font-size: 19px; font-weight: 600; fill: #697782; }
      .pill { font-size: 15px; font-weight: 800; }
      .label { font-size: 18px; font-weight: 800; }
      .small { font-size: 16px; font-weight: 700; }
      .claim { font-size: 24px; font-weight: 700; fill: #2B333B; }
      .muted { fill: #6B7A86; }
    </style>
  </defs>

  <rect width="1600" height="720" rx="0" fill="url(#bg)"/>
  <rect x="24" y="24" width="1552" height="672" rx="34" fill="white" opacity="0.86"/>
  <rect x="24" y="24" width="1552" height="672" rx="34" stroke="#D9E4E8" stroke-width="2"/>
  <rect x="48" y="48" width="1504" height="624" rx="26" fill="url(#dotGrid)" opacity="0.5"/>

  <g class="font">
    <g transform="translate(92 78)">
      <g transform="translate(0 4)">
        <rect x="0" y="0" width="54" height="54" rx="14" fill="#0F6975"/>
        <rect x="14" y="14" width="26" height="26" rx="5" fill="#79CDD3" stroke="#FFFFFF" stroke-width="3"/>
        <path d="M-10 17H0M-10 27H0M-10 37H0M54 17H64M54 27H64M54 37H64M17 -10V0M27 -10V0M37 -10V0M17 54V64M27 54V64M37 54V64" stroke="#E6A13A" stroke-width="4" stroke-linecap="round"/>
      </g>
      <text x="82" y="18" class="eyebrow">Firmware uplink overview</text>
      <text x="82" y="72" class="title">Nordic IoT Lab</text>
      <text x="82" y="108" class="subtitle">nRF9161 DK telemetry through secure NB-IoT transports</text>
    </g>

    <g transform="translate(1115 82)">
      <rect x="0" y="0" width="92" height="34" rx="17" fill="#E6F4F5" stroke="#99D4D8"/>
      <text x="46" y="23" text-anchor="middle" class="pill" fill="#12606B">GNSS</text>
      <rect x="104" y="0" width="100" height="34" rx="17" fill="#FFF2D9" stroke="#E8C579"/>
      <text x="154" y="23" text-anchor="middle" class="pill" fill="#A66514">NB-IoT</text>
      <rect x="216" y="0" width="112" height="34" rx="17" fill="#E9F1FE" stroke="#AFC5E8"/>
      <text x="272" y="23" text-anchor="middle" class="pill" fill="#315F9D">MQTT</text>
      <rect x="340" y="0" width="118" height="34" rx="17" fill="#EBF7EF" stroke="#A9D7B8"/>
      <text x="399" y="23" text-anchor="middle" class="pill" fill="#3E8A5C">CoAP</text>
    </g>

    <g filter="url(#softShadow)">
      <rect x="112" y="228" width="280" height="186" rx="28" fill="url(#deviceFill)" stroke="#2E98A2" stroke-width="4"/>
      <rect x="436" y="228" width="280" height="186" rx="28" fill="url(#uplinkFill)" stroke="#E5A139" stroke-width="4"/>
      <rect x="760" y="228" width="280" height="186" rx="28" fill="url(#brokerFill)" stroke="#315F9D" stroke-width="4"/>
      <rect x="1084" y="228" width="280" height="186" rx="28" fill="url(#dashFill)" stroke="#4F9B6E" stroke-width="4"/>
    </g>

    <path d="M402 321H426" stroke="#E3A23D" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
    <path d="M726 321H750" stroke="#E3A23D" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
    <path d="M1050 321H1074" stroke="#E3A23D" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>

    <g transform="translate(207 172)">
      <rect x="10" y="28" width="70" height="48" rx="11" fill="#0F6975" stroke="#E6A13A" stroke-width="5"/>
      <rect x="26" y="42" width="38" height="20" rx="5" fill="#6CCBD1" stroke="#FFFFFF" stroke-width="3"/>
      <path d="M0 38H10M0 52H10M0 66H10M80 38H90M80 52H90M80 66H90M28 18V28M45 18V28M62 18V28M28 76V86M45 76V86M62 76V86" stroke="#0F6975" stroke-width="4" stroke-linecap="round"/>
      <circle cx="18" cy="106" r="7" fill="#E6A13A"/>
      <circle cx="42" cy="106" r="7" fill="#4F9B6E"/>
      <circle cx="66" cy="106" r="7" fill="#315F9D"/>
    </g>

    <g transform="translate(565 176)">
      <path d="M0 54C34 24 86 24 120 54" stroke="#F4CE93" stroke-width="6" stroke-linecap="round"/>
      <path d="M23 73C46 54 74 54 97 73" stroke="#E6A13A" stroke-width="6" stroke-linecap="round"/>
      <circle cx="60" cy="91" r="12" fill="#E6A13A"/>
    </g>

    <g transform="translate(852 178)">
      <rect x="0" y="40" width="132" height="54" rx="4" fill="#FFFFFF" stroke="#315F9D" stroke-width="4"/>
      <rect x="28" y="16" width="132" height="54" rx="4" fill="#FFFFFF" stroke="#315F9D" stroke-width="4"/>
      <rect x="56" y="64" width="132" height="54" rx="4" fill="#FFFFFF" stroke="#315F9D" stroke-width="4"/>
      <path d="M22 57H86M50 33H132M78 81H164" stroke="#D4E2F5" stroke-width="5" stroke-linecap="round"/>
    </g>

    <g transform="translate(1186 181)">
      <rect x="0" y="26" width="108" height="76" rx="17" fill="#4F9B6E"/>
      <path d="M32 64L51 81L79 43" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M124 42H162M124 63H178M124 84H150" stroke="#4F9B6E" stroke-width="7" stroke-linecap="round"/>
    </g>

    <text x="252" y="312" text-anchor="middle" class="node-title">nRF9161 DK</text>
    <text x="252" y="344" text-anchor="middle" class="node-copy">GNSS + modem state</text>
    <text x="576" y="312" text-anchor="middle" class="node-title">Uplink matrix</text>
    <text x="576" y="344" text-anchor="middle" class="node-copy">MQTT/TLS + CoAP/DTLS</text>
    <text x="900" y="312" text-anchor="middle" class="node-title">Broker + storage</text>
    <text x="900" y="344" text-anchor="middle" class="node-copy">EMQX ACL + PostgreSQL</text>
    <text x="1224" y="312" text-anchor="middle" class="node-title">Web dashboard</text>
    <text x="1224" y="344" text-anchor="middle" class="node-copy">GPS track + history</text>

    <g transform="translate(130 466)">
      <text x="0" y="24" class="eyebrow">Evidence boundary</text>
      <rect x="0" y="56" width="1340" height="76" rx="24" fill="#F8FAFB" stroke="#D9E4E8" stroke-width="2"/>
      <g transform="translate(30 77)">
        <circle cx="13" cy="17" r="13" fill="#315F9D"/>
        <path d="M7 17H19M13 11V23" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
        <text x="40" y="23" class="label" fill="#315F9D">versioned releases</text>
      </g>
      <path d="M344 94H410" stroke="#C6D4DB" stroke-width="4" stroke-linecap="round"/>
      <g transform="translate(432 77)">
        <circle cx="13" cy="17" r="13" fill="#12606B"/>
        <path d="M5 18L11 24L22 10" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="40" y="23" class="label" fill="#12606B">source badges</text>
      </g>
      <path d="M682 94H748" stroke="#C6D4DB" stroke-width="4" stroke-linecap="round"/>
      <g transform="translate(770 77)">
        <circle cx="13" cy="17" r="13" fill="#C95F66"/>
        <path d="M7 17H19" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
        <text x="40" y="23" class="label" fill="#C95F66">private firmware/web</text>
      </g>
      <path d="M1055 94H1121" stroke="#C6D4DB" stroke-width="4" stroke-linecap="round"/>
      <g transform="translate(1143 77)">
        <circle cx="13" cy="17" r="13" fill="#4F9B6E"/>
        <path d="M6 17H20M13 10V24" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
        <text x="40" y="23" class="label" fill="#4F9B6E">public broker baseline</text>
      </g>
    </g>

    <g transform="translate(130 636)">
      <rect x="0" y="-26" width="8" height="44" rx="4" fill="#9FC5D1"/>
      <text x="28" y="0" class="claim">Reproducible NB-IoT lab stack for telemetry, security checks, and dashboard validation.</text>
    </g>
  </g>
</svg>
