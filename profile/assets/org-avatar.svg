  <path d="M362 520H424L512 620L662 454" stroke="#F8FBFC" stroke-width="38" stroke-linecap="round" stroke-linejoin="round" opacity="0.94"/>
  <path d="M222 242L302 162H372" stroke="#F4A83F" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <path d="M802 782L722 862H652" stroke="#78D2D7" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" opacity="0.86"/>
</svg>
