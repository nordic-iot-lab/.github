<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Nordic IoT Lab logo</title>
  <desc id="desc">A compact Nordic IoT Lab organization mark with a chip, radio arcs, and telemetry path.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="96" x2="924" y2="936" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E7682"/>
      <stop offset="0.58" stop-color="#11606C"/>
      <stop offset="1" stop-color="#173D56"/>
    </linearGradient>
    <linearGradient id="chip" x1="330" y1="330" x2="694" y2="694" gradientUnits="userSpaceOnUse">
      <stop stop-color="#87DADF"/>
      <stop offset="1" stop-color="#D8F6F7"/>
    </linearGradient>
    <linearGradient id="north" x1="260" y1="172" x2="766" y2="858" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7B449"/>
      <stop offset="1" stop-color="#F1D08B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="30" stdDeviation="34" flood-color="#06232B" flood-opacity="0.28"/>
    </filter>
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <path d="M512 116C730.704 116 908 293.296 908 512C908 730.704 730.704 908 512 908C293.296 908 116 730.704 116 512C116 293.296 293.296 116 512 116Z" fill="#FFFFFF" opacity="0.055"/>
  <path d="M236 776C322 856 458 890 586 856C713 822 814 725 844 598" stroke="#D8F6F7" stroke-width="28" stroke-linecap="round" opacity="0.22"/>
  <path d="M178 456C198 312 314 198 459 181" stroke="#D8F6F7" stroke-width="28" stroke-linecap="round" opacity="0.2"/>

  <g filter="url(#shadow)">
    <rect x="336" y="336" width="352" height="352" rx="82" fill="#0B4E59" stroke="url(#north)" stroke-width="28"/>
    <rect x="420" y="420" width="184" height="184" rx="34" fill="url(#chip)" stroke="#F8FBFC" stroke-width="22"/>

    <path d="M286 412H336M286 484H336M286 556H336M286 628H336" stroke="url(#north)" stroke-width="28" stroke-linecap="round"/>
    <path d="M688 412H738M688 484H738M688 556H738M688 628H738" stroke="url(#north)" stroke-width="28" stroke-linecap="round"/>
    <path d="M412 286V336M484 286V336M556 286V336M628 286V336" stroke="url(#north)" stroke-width="28" stroke-linecap="round"/>
    <path d="M412 688V738M484 688V738M556 688V738M628 688V738" stroke="url(#north)" stroke-width="28" stroke-linecap="round"/>
  </g>

  <g filter="url(#innerGlow)">
    <path d="M324 296C431 198 593 198 700 296" stroke="#F4CB84" stroke-width="28" stroke-linecap="round"/>
    <path d="M382 244C455 191 569 191 642 244" stroke="#F7E1B5" stroke-width="20" stroke-linecap="round" opacity="0.78"/>
    <circle cx="512" cy="300" r="24" fill="#F4A83F"/>
  </g>

  <path d="M300 756C392 730 444 670 488 576C526 496 574 432 724 390" stroke="#F8FBFC" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" opacity="0.94"/>
