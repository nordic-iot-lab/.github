<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Nordic IoT Lab architecture</title>
  <desc id="desc">nRF9161 firmware sends telemetry over NB-IoT using MQTT, MQTT over TLS, CoAP, or CoAP over DTLS into EMQX and the dashboard.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071C24"/>
      <stop offset="0.55" stop-color="#123B46"/>
      <stop offset="1" stop-color="#F2B35D"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#E7F8F7" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#00141A" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10" stroke="#F2B35D" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1200" height="620" rx="34" fill="url(#bg)"/>
  <circle cx="1010" cy="112" r="102" fill="#FFE1A3" opacity="0.18"/>
  <circle cx="160" cy="528" r="138" fill="#5BD0C6" opacity="0.12"/>
  <path d="M90 121C205 66 301 77 420 126C553 180 666 181 793 135C929 86 1035 76 1118 121" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="3"/>
  <text x="72" y="78" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="800">Nordic IoT Lab</text>
  <text x="74" y="116" fill="#CFEFEC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20">NB-IoT telemetry, secure uplinks, broker persistence, and web visibility</text>

  <g filter="url(#shadow)">
    <rect x="72" y="190" width="250" height="250" rx="28" fill="url(#card)"/>
    <text x="102" y="240" fill="#06242D" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="25" font-weight="800">Firmware</text>
    <text x="102" y="274" fill="#24535C" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">nRF9161 DK</text>
    <rect x="102" y="312" width="72" height="52" rx="14" fill="#0E5964"/>
    <circle cx="141" cy="338" r="12" fill="#5BD0C6"/>
    <rect x="186" y="316" width="88" height="12" rx="6" fill="#D9F2F0"/>
    <rect x="186" y="340" width="62" height="12" rx="6" fill="#D9F2F0"/>
    <text x="102" y="398" fill="#2D5D65" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">MQTT / TLS</text>
    <text x="102" y="421" fill="#2D5D65" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">CoAP / DTLS</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="475" y="160" width="250" height="310" rx="28" fill="url(#card)"/>
    <text x="505" y="210" fill="#06242D" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="25" font-weight="800">Broker</text>
    <text x="505" y="244" fill="#24535C" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">EMQX + PostgreSQL</text>
    <rect x="505" y="286" width="190" height="54" rx="15" fill="#0E5964"/>
    <text x="535" y="320" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">MQTT Ingress</text>
    <rect x="505" y="358" width="190" height="54" rx="15" fill="#F2B35D"/>
    <text x="538" y="392" fill="#432A07" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="800">Persistence</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="878" y="190" width="250" height="250" rx="28" fill="url(#card)"/>
    <text x="908" y="240" fill="#06242D" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="25" font-weight="800">Dashboard</text>
    <text x="908" y="274" fill="#24535C" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Node status + GPS</text>
    <rect x="908" y="310" width="190" height="95" rx="16" fill="#E7F8F7" stroke="#C0E5E2"/>
    <rect x="928" y="331" width="52" height="52" rx="14" fill="#0E5964"/>
    <path d="M954 342C943 342 936 349 936 358C936 371 954 382 954 382C954 382 972 371 972 358C972 349 965 342 954 342Z" fill="#5BD0C6"/>
    <circle cx="954" cy="358" r="5" fill="#E7F8F7"/>
    <rect x="996" y="336" width="78" height="10" rx="5" fill="#A7D7D3"/>
    <rect x="996" y="358" width="58" height="10" rx="5" fill="#A7D7D3"/>
    <rect x="996" y="380" width="88" height="10" rx="5" fill="#A7D7D3"/>
  </g>

  <path d="M334 300C383 268 414 256 461 249" stroke="#F2B35D" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M334 360C388 392 418 403 462 409" stroke="#5BD0C6" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="344" y="250" fill="#FFE1A3" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">secure + plain test modes</text>
  <path d="M739 315C790 315 821 315 866 315" stroke="#F2B35D" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="765" y="292" fill="#FFE1A3" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">normalized telemetry</text>
  <path d="M892 458C800 535 447 536 313 455" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="3" stroke-dasharray="10 10"/>
  <text x="438" y="554" fill="#DDF6F4" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17">版本化 releases / bilingual docs / Docker-first server deployment</text>
</svg>

